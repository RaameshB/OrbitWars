name: Deploy Simulation

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [trigger-simulation]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Pull Latest Checkpoint from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install awscli
          mkdir -p /tmp/checkpoints_v6

          # Find the latest uncompressed checkpoint directory (highest gen number)
          LATEST=$(aws s3 ls s3://${{ secrets.R2_BUCKET_NAME }}/v6/ \
            --endpoint-url ${{ secrets.R2_ENDPOINT_URL }} \
            | awk '{print $NF}' | grep -E '^qdax_rep_[0-9]+/$' \
            | sed 's/\///' | sort -t_ -k3 -n | tail -1)
          echo "Latest checkpoint: $LATEST"

          aws s3 sync s3://${{ secrets.R2_BUCKET_NAME }}/v6/$LATEST/ \
            /tmp/checkpoints_v6/$LATEST/ \
            --endpoint-url ${{ secrets.R2_ENDPOINT_URL }}

          # Pull HoF if it exists (silently skip if not)
          aws s3 sync s3://${{ secrets.R2_BUCKET_NAME }}/v6/${LATEST}_hof/ \
            /tmp/checkpoints_v6/${LATEST}_hof/ \
            --endpoint-url ${{ secrets.R2_ENDPOINT_URL }} 2>/dev/null || true

      - name: Install Python Dependencies
        run: |
          source .venv/bin/activate
          uv pip install -r <(uv pip compile pyproject.toml)

      - name: Generate Replay HTML
        run: |
          source .venv/bin/activate
          python scripts/generate_site.py --players ${{ github.event.client_payload.players || '4' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
